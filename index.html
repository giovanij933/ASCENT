<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover, user-scalable=no">
<meta name="theme-color" content="#0b0c0e">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="ASCENT">
<title>ASCENT — Practice Console</title>
<link rel="manifest" href="./manifest.json">
<link rel="apple-touch-icon" href="data:image/svg+xml,%3Csvg%20xmlns='http://www.w3.org/2000/svg'%20viewBox='0,0,512,512'%3E%3Crect%20width='512'%20height='512'%20rx='96'%20fill='%230b0c0e'/%3E%3Cg%20fill='none'%20stroke='%23e6a92e'%20stroke-width='34'%20stroke-linecap='round'%20stroke-linejoin='round'%3E%3Cpath%20d='M150,330L256,224L362,330'/%3E%3Cpath%20d='M150,392L256,286L362,392'/%3E%3C/g%3E%3C/svg%3E">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=IBM+Plex+Mono:wght@400;500;600&display=swap" rel="stylesheet">
<style>
*{box-sizing:border-box;-webkit-tap-highlight-color:transparent}
html,body{margin:0;padding:0}
:root{
 --bg:#0b0c0e;--surface:#16171b;--line:rgba(255,255,255,.08);--line2:rgba(255,255,255,.16);
 --text:#ece9e2;--muted:#8f8d87;--faint:#5e5d58;--accent:#e6a92e;--accent2:#7a5e2a;--danger:#d8654f;
 --mono:'IBM Plex Mono',ui-monospace,SFMono-Regular,Menlo,Consolas,'Liberation Mono',monospace;
}
body{background:var(--bg);color:var(--text);font-family:var(--mono);font-size:14px;line-height:1.5;-webkit-font-smoothing:antialiased;min-height:100dvh}
#app{max-width:480px;margin:0 auto;padding:0 16px calc(86px + env(safe-area-inset-bottom));min-height:100dvh}
header{display:flex;align-items:center;justify-content:space-between;padding:18px 2px 14px;position:sticky;top:0;background:linear-gradient(var(--bg),var(--bg) 72%,transparent);z-index:5}
.brand{display:flex;align-items:center;gap:10px}
.brand-name{font-weight:600;letter-spacing:3px;font-size:15px}
.brand-sub{font-size:10px;color:var(--faint);letter-spacing:2px;text-transform:uppercase;margin-top:1px}
.hbtns{display:flex;gap:8px}
button{font-family:var(--mono);cursor:pointer;border:none;background:none;color:inherit;font-size:14px}
.ghost{border:1px solid var(--line2);background:transparent;color:var(--muted);padding:6px 10px;border-radius:8px;font-size:11px;letter-spacing:1px;transition:.15s}
.ghost:hover{border-color:var(--accent2);color:var(--text)}
.ghost.off{color:var(--faint)}
.hidden{display:none!important}
.view{padding-top:4px;animation:fade .2s ease}
@keyframes fade{from{opacity:0;transform:translateY(4px)}to{opacity:1;transform:none}}
.block{margin-bottom:20px}
.block-label,.panel-label,.hist-label{font-size:10px;letter-spacing:2px;text-transform:uppercase;color:var(--faint);margin-bottom:9px}
.chips{display:flex;flex-wrap:wrap;gap:8px}
.chip{border:1px solid var(--line2);background:var(--surface);color:var(--muted);padding:9px 13px;border-radius:9px;font-size:12px;letter-spacing:.5px;transition:.15s}
.chip:hover{border-color:var(--accent2)}
.chip.on{border-color:var(--accent);color:var(--accent);background:rgba(230,169,46,.08)}
.tip{margin-top:10px;color:var(--muted);font-size:12px;line-height:1.55;min-height:34px}
.plan-wrap{margin:18px 0 22px}
.plan{color:var(--muted);font-size:11px;line-height:1.8;letter-spacing:.3px;border-left:2px solid var(--accent2);padding-left:12px}
.primary{background:var(--accent);color:#1a1305;border-radius:10px;padding:13px;font-weight:600;font-size:14px;letter-spacing:1px;width:100%;transition:.15s}
.primary:hover{filter:brightness(1.08)}
.primary:disabled{opacity:.6}
.primary.big{padding:16px;font-size:15px;letter-spacing:2px}
.primary.sm,.ghost.sm{width:auto;padding:9px 14px;font-size:12px}
.danger{color:var(--danger)}
.danger.ghost{border-color:rgba(216,101,79,.4)}
.danger.ghost:hover{border-color:var(--danger);color:var(--danger)}
.done{margin-top:20px;border:1px solid var(--accent2);background:rgba(230,169,46,.07);border-radius:12px;padding:16px}
#done-text{font-size:13px;color:var(--accent);margin-bottom:12px;line-height:1.5}
.done-actions{display:flex;gap:10px;align-items:center}
.ring-wrap{position:relative;width:280px;height:280px;margin:8px auto 6px}
.ring-wrap svg{width:100%;height:100%;display:block}
.ring-center{position:absolute;inset:0;display:flex;flex-direction:column;align-items:center;justify-content:center}
.ring-time{font-size:46px;font-weight:600;letter-spacing:1px;font-variant-numeric:tabular-nums}
.ring-sub{font-size:11px;color:var(--muted);letter-spacing:1.5px;margin-top:6px}
.phase{text-align:center;margin:8px 0 22px;min-height:80px}
.phase-name{font-size:13px;letter-spacing:2px;text-transform:uppercase;color:var(--accent)}
.phase-instr{color:var(--muted);font-size:13px;line-height:1.6;margin:10px auto 0;max-width:340px}
.run-actions{display:flex;gap:12px}
.run-actions button{flex:1;border:1px solid var(--line2);border-radius:10px;padding:13px;letter-spacing:1px}
#btn-end{border-color:rgba(216,101,79,.4)}
.form label{display:block;margin-bottom:14px;font-size:10px;letter-spacing:2px;text-transform:uppercase;color:var(--faint)}
.form input,.form select,.form textarea{display:block;width:100%;margin-top:7px;background:var(--surface);border:1px solid var(--line2);border-radius:9px;color:var(--text);font-family:var(--mono);font-size:14px;padding:11px;letter-spacing:.3px;text-transform:none}
.form input:focus,.form select:focus,.form textarea:focus{outline:none;border-color:var(--accent)}
.form textarea{resize:vertical;line-height:1.55}
.form-row.two{display:flex;gap:12px}
.form-row.two label{flex:1}
.form-row{display:flex;align-items:center;gap:12px;margin-bottom:14px}
.form-row .lbl{font-size:10px;letter-spacing:2px;text-transform:uppercase;color:var(--faint)}
.rating{display:flex;gap:7px}
.rb{width:38px;height:38px;border:1px solid var(--line2);border-radius:9px;background:var(--surface);color:var(--muted);font-size:13px;transition:.12s}
.rb.on{border-color:var(--accent);color:var(--accent);background:rgba(230,169,46,.1)}
.hist-label{margin:24px 0 12px}
.history{display:flex;flex-direction:column;gap:10px}
.entry{border:1px solid var(--line);background:var(--surface);border-radius:11px;padding:13px 14px;position:relative}
.entry-top{display:flex;align-items:center;gap:10px;flex-wrap:wrap}
.etag{color:var(--accent);font-size:12px;letter-spacing:.5px}
.emin{color:var(--text);font-size:12px}
.edate{color:var(--faint);font-size:11px;margin-left:auto}
.entry-meta{color:var(--accent);font-size:11px;letter-spacing:1px;margin-top:8px;opacity:.85}
.enote{color:var(--muted);font-size:13px;line-height:1.55;margin-top:8px;white-space:pre-wrap}
.edist{color:var(--faint);font-size:12px;margin-top:6px}
.edel{position:absolute;top:11px;right:12px;color:var(--faint);font-size:10px;letter-spacing:1px}
.edel:hover{color:var(--danger)}
.empty{color:var(--faint);font-size:13px;line-height:1.6;text-align:center;padding:24px 12px;border:1px dashed var(--line2);border-radius:11px}
.metrics{display:grid;grid-template-columns:1fr 1fr;gap:10px;margin-bottom:8px}
.metric{background:var(--surface);border:1px solid var(--line);border-radius:11px;padding:15px 16px}
.metric-val{font-size:24px;font-weight:600;color:var(--accent);font-variant-numeric:tabular-nums}
.metric-label{font-size:10px;letter-spacing:1.5px;text-transform:uppercase;color:var(--faint);margin-top:5px}
.panel{background:var(--surface);border:1px solid var(--line);border-radius:12px;padding:15px 16px;margin-top:12px}
.cap{font-size:10px;color:var(--faint);letter-spacing:1px;margin-top:9px}
.bd-row{display:flex;align-items:center;gap:10px;margin:8px 0}
.bd-label{font-size:11px;color:var(--muted);width:104px;flex:none}
.bd-bar{flex:1;height:8px;background:rgba(255,255,255,.05);border-radius:4px;overflow:hidden}
.bd-bar>span{display:block;height:100%;background:var(--accent);border-radius:4px}
.bd-val{font-size:11px;color:var(--faint);width:44px;text-align:right;flex:none;font-variant-numeric:tabular-nums}
.l14{display:flex;align-items:flex-end;gap:4px;height:70px}
.l14-bar{flex:1;height:100%;display:flex;align-items:flex-end;background:rgba(255,255,255,.03);border-radius:3px;overflow:hidden}
.l14-bar>span{display:block;width:100%;background:var(--accent2);border-radius:3px}
.l14-bar.has>span{background:var(--accent)}
.l14-bar.today{outline:1px solid var(--accent2)}
.data-btns{display:flex;gap:10px;flex-wrap:wrap}
.data-btns .ghost{flex:1;text-align:center}
#tabbar{position:fixed;left:0;right:0;bottom:0;display:flex;justify-content:center;background:rgba(11,12,14,.94);backdrop-filter:blur(8px);border-top:1px solid var(--line);padding:8px 0 calc(8px + env(safe-area-inset-bottom));z-index:10}
#tabbar button{flex:1;max-width:160px;color:var(--faint);font-size:11px;letter-spacing:1.5px;padding:8px 4px;border-radius:8px}
#tabbar button.on{color:var(--accent)}
@media(max-width:380px){.ring-wrap{width:240px;height:240px}.ring-time{font-size:40px}}
</style>
</head>
<body>
<div id="app">
  <header>
    <div class="brand">
      <svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="#e6a92e" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round"><path d="M5 14 L12 7 L19 14"/><path d="M5 18 L12 11 L19 18"/></svg>
      <div><div class="brand-name">ASCENT</div><div class="brand-sub">practice console</div></div>
    </div>
    <div class="hbtns"><button id="btn-install" class="ghost hidden">install</button><button id="btn-sound" class="ghost">sound on</button></div>
  </header>
  <main>
    <section id="view-practice" class="view active">
      <div id="practice-setup">
        <div class="block">
          <div class="block-label">vehicle</div>
          <div id="veh-chips" class="chips">
            <button class="chip" data-v="negation">Negation</button>
            <button class="chip" data-v="image">Image</button>
            <button class="chip" data-v="sound">Sound &amp; name</button>
            <button class="chip" data-v="ritual">Ritual</button>
          </div>
          <div id="veh-tip" class="tip"></div>
        </div>
        <div class="block">
          <div class="block-label">duration</div>
          <div id="dur-chips" class="chips">
            <button class="chip" data-m="10">10m</button>
            <button class="chip" data-m="15">15m</button>
            <button class="chip" data-m="20">20m</button>
            <button class="chip" data-m="30">30m</button>
            <button class="chip" data-m="45">45m</button>
          </div>
        </div>
        <div class="plan-wrap"><div class="block-label">session arc</div><div id="plan" class="plan"></div></div>
        <button id="btn-begin" class="primary big">Begin climb</button>
        <div id="done-banner" class="done hidden">
          <div id="done-text"></div>
          <div class="done-actions"><button id="btn-donelog" class="primary sm">Log this session</button><button id="btn-donedismiss" class="ghost sm">dismiss</button></div>
        </div>
      </div>
      <div id="practice-run" class="hidden">
        <div class="ring-wrap">
          <svg viewBox="0 0 280 280">
            <circle cx="140" cy="140" r="120" fill="none" stroke="rgba(255,255,255,0.07)" stroke-width="10"/>
            <circle id="ring-prog" cx="140" cy="140" r="120" fill="none" stroke="#e6a92e" stroke-width="10" stroke-linecap="round" stroke-dasharray="753.98" stroke-dashoffset="753.98" transform="rotate(-90 140 140)"/>
          </svg>
          <div class="ring-center"><div id="ring-time" class="ring-time">0:00</div><div id="ring-sub" class="ring-sub"></div></div>
        </div>
        <div class="phase"><div id="phase-name" class="phase-name"></div><div id="phase-instr" class="phase-instr"></div></div>
        <div class="run-actions"><button id="btn-pause" class="ghost">Pause</button><button id="btn-end" class="danger">End</button></div>
      </div>
    </section>
    <section id="view-log" class="view">
      <div class="form">
        <div class="form-row two"><label>date<input type="date" id="f-date"></label><label>minutes<input type="number" id="f-minutes" min="1" max="240" value="20"></label></div>
        <label>vehicle<select id="f-vehicle"><option value="negation">Negation</option><option value="image" selected>Image</option><option value="sound">Sound &amp; name</option><option value="ritual">Ritual</option></select></label>
        <div class="form-row"><span class="lbl">steadiness</span><div id="rating" class="rating"><button class="rb" data-r="1">1</button><button class="rb" data-r="2">2</button><button class="rb" data-r="3">3</button><button class="rb" data-r="4">4</button><button class="rb" data-r="5">5</button></div></div>
        <label>what arose<textarea id="f-notes" rows="3" placeholder="states, insight, imagery, what the climb was like..."></textarea></label>
        <label>distractions<input type="text" id="f-distractions" placeholder="what pulled attention away"></label>
        <button id="btn-save" class="primary">Save session</button>
      </div>
      <div class="hist-label">history</div>
      <div id="history" class="history"></div>
    </section>
    <section id="view-stats" class="view">
      <div class="metrics">
        <div class="metric"><div class="metric-val" id="m-sessions">0</div><div class="metric-label">sessions</div></div>
        <div class="metric"><div class="metric-val" id="m-minutes">0m</div><div class="metric-label">practiced</div></div>
        <div class="metric"><div class="metric-val" id="m-streak">0 days</div><div class="metric-label">current streak</div></div>
        <div class="metric"><div class="metric-val" id="m-longest">0 days</div><div class="metric-label">longest streak</div></div>
      </div>
      <div class="panel"><div class="panel-label">cumulative climb</div><div id="curve"></div></div>
      <div class="panel"><div class="panel-label">by vehicle</div><div id="breakdown"></div></div>
      <div class="panel"><div class="panel-label">recent rhythm</div><div id="last14"></div></div>
      <div class="panel"><div class="panel-label">data</div><div class="data-btns"><button id="btn-export" class="ghost">export</button><button id="btn-import" class="ghost">import</button><button id="btn-clear" class="ghost danger">clear all</button></div></div>
    </section>
  </main>
</div>
<nav id="tabbar"><button data-v="practice" class="on">▲ Practice</button><button data-v="log">✎ Log</button><button data-v="stats">▦ Stats</button></nav>
<input type="file" id="importer" accept="application/json,.json" hidden>
<script>
(function(){
'use strict';
const KEY='ascent.v1';
const VEHICLES={
  negation:{label:'Negation',tip:'Empty the mind — subtract every image until only awareness remains.',ascend:'Let go of each thought, image, and sensation as it arises. Keep subtracting; rest in what cannot be removed.'},
  image:{label:'Image',tip:'Climb a symbol — hold a form and let it draw you upward.',ascend:'Hold your chosen symbol steady. Let it brighten and lift attention upward, rung by rung.'},
  sound:{label:'Sound & name',tip:'Repeat a name or sound in rhythm with the breath.',ascend:'Repeat the name or sound with the breath. Let the vibration gather and carry attention upward.'},
  ritual:{label:'Ritual',tip:'Perform a deliberate sequence with full attention.',ascend:'Move through your sequence with complete attention. Let each gesture and word align and elevate.'}
};
const PHASES=[
  {key:'settle',name:'Settle & purify',pct:0.12,color:'#8f8d87',instr:'Settle the body. Release the day. Set a clear intention for this climb.'},
  {key:'concentrate',name:'Concentrate',pct:0.20,color:'#5b8fd6',instr:'Gather attention to a single point — the breath, a flame, a word. Stabilize it.'},
  {key:'ascend',name:'Ascend',pct:0.48,color:'#e6a92e',instr:''},
  {key:'observe',name:'Observe & test',pct:0.10,color:'#3fb494',instr:'Notice what arises without grasping. Question any vision; let false images dissolve.'},
  {key:'return',name:'Return & integrate',pct:0.10,color:'#9a8cc0',instr:'Descend gently. Carry the stillness with you. Note one thing to remember.'}
];
let state=load();
let sel={vehicle:'image',minutes:20};
let sess=null;
let actx=null;
let deferred=null;
const $=id=>document.getElementById(id);
const el=(t,c,h)=>{const e=document.createElement(t);if(c)e.className=c;if(h!=null)e.innerHTML=h;return e;};

function load(){try{const s=JSON.parse(localStorage.getItem(KEY));if(s&&Array.isArray(s.entries))return{entries:s.entries,settings:Object.assign({sound:true},s.settings)};}catch(e){}return{entries:[],settings:{sound:true}};}
function save(){try{localStorage.setItem(KEY,JSON.stringify(state));}catch(e){}}
function dstr(d){const x=d||new Date();return x.getFullYear()+'-'+String(x.getMonth()+1).padStart(2,'0')+'-'+String(x.getDate()).padStart(2,'0');}
function parseD(s){const p=s.split('-').map(Number);return Date.UTC(p[0],p[1]-1,p[2]);}
function prevStr(s){return new Date(parseD(s)-86400000).toISOString().slice(0,10);}
function prevN(n){return new Date(parseD(dstr(new Date()))-n*86400000).toISOString().slice(0,10);}
function uid(){return Date.now().toString(36)+Math.random().toString(36).slice(2,7);}
function escapeHtml(s){return(s||'').replace(/[&<>"']/g,c=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c]));}
function fmt(sec){sec=Math.max(0,Math.round(sec));const m=Math.floor(sec/60),s=sec%60;return m+':'+String(s).padStart(2,'0');}

function ensureAudio(){if(!state.settings.sound)return;try{if(!actx)actx=new(window.AudioContext||window.webkitAudioContext)();if(actx.state==='suspended')actx.resume();}catch(e){}}
function tone(f,start,dur,peak){if(!actx||!state.settings.sound)return;const o=actx.createOscillator(),g=actx.createGain();o.type='sine';o.frequency.value=f;o.connect(g);g.connect(actx.destination);const t=actx.currentTime+start;g.gain.setValueAtTime(0.0001,t);g.gain.linearRampToValueAtTime(peak,t+0.04);g.gain.exponentialRampToValueAtTime(0.0001,t+dur);o.start(t);o.stop(t+dur+0.05);}
function chimePhase(){ensureAudio();tone(528,0,0.5,0.18);tone(660,0.18,0.55,0.12);}
function chimeDone(){ensureAudio();tone(440,0,0.5,0.16);tone(554,0.16,0.5,0.14);tone(660,0.32,0.7,0.16);}
function buzz(p){try{navigator.vibrate&&navigator.vibrate(p);}catch(e){}}

function buildPhases(totalSec){
  let secs=PHASES.map(p=>p.key==='ascend'?0:Math.max(1,Math.round(totalSec*p.pct)));
  const sum=secs.reduce((a,b)=>a+b,0);
  const ai=PHASES.findIndex(p=>p.key==='ascend');
  secs[ai]=Math.max(totalSec-sum,1);
  const bounds=[];let acc=0;for(const s of secs){acc+=s;bounds.push(acc);}
  return{secs,bounds};
}
function planText(){const{secs}=buildPhases(sel.minutes*60);return PHASES.map((p,i)=>p.name+' '+Math.max(1,Math.round(secs[i]/60))+'m').join('  ·  ');}
function startSession(){
  ensureAudio();
  const totalSec=sel.minutes*60;const{secs,bounds}=buildPhases(totalSec);
  sess={totalSec,elapsedSec:0,paused:false,secs,bounds,pi:-1,timer:null};
  $('practice-setup').classList.add('hidden');$('practice-run').classList.remove('hidden');$('done-banner').classList.add('hidden');
  $('btn-pause').textContent='Pause';
  tickPhaseUpdate(true);paintRing();buzz(20);
  sess.timer=setInterval(tick,1000);
}
function tick(){if(!sess||sess.paused)return;sess.elapsedSec++;if(sess.elapsedSec>=sess.totalSec){sess.elapsedSec=sess.totalSec;finishSession();return;}tickPhaseUpdate(false);paintRing();}
function curPhaseIndex(){const e=sess.elapsedSec;for(let i=0;i<sess.bounds.length;i++){if(e<sess.bounds[i])return i;}return sess.bounds.length-1;}
function tickPhaseUpdate(force){const i=curPhaseIndex();if(i!==sess.pi){sess.pi=i;if(!force){chimePhase();buzz([0,40,40,40]);}updatePhaseUI();}}
function updatePhaseUI(){const p=PHASES[sess.pi];$('phase-name').textContent=p.name;$('phase-instr').textContent=p.key==='ascend'?VEHICLES[sel.vehicle].ascend:p.instr;$('ring-prog').style.stroke=p.color;}
function paintRing(){const C=753.98,prog=sess?sess.elapsedSec/sess.totalSec:0;$('ring-prog').style.strokeDashoffset=String(C*(1-prog));if(sess){$('ring-time').textContent=fmt(sess.totalSec-sess.elapsedSec);const prem=sess.bounds[sess.pi]-sess.elapsedSec;$('ring-sub').textContent='phase '+(sess.pi+1)+'/5 · '+fmt(prem);}}
function togglePause(){if(!sess)return;sess.paused=!sess.paused;$('btn-pause').textContent=sess.paused?'Resume':'Pause';}
function closeRun(){if(sess&&sess.timer)clearInterval(sess.timer);$('practice-run').classList.add('hidden');$('practice-setup').classList.remove('hidden');}
function endSession(){const mins=sess?Math.max(1,Math.round(sess.elapsedSec/60)):sel.minutes;const v=sel.vehicle;sess=null;closeRun();showDone(v,mins);}
function finishSession(){if(sess&&sess.timer)clearInterval(sess.timer);chimeDone();buzz([0,80,60,80,60,120]);const v=sel.vehicle,mins=Math.round(sess.totalSec/60);sess=null;$('practice-run').classList.add('hidden');$('practice-setup').classList.remove('hidden');showDone(v,mins);}
function showDone(vehicle,minutes){const b=$('done-banner');b.classList.remove('hidden');$('done-text').textContent='Session complete — '+minutes+' min · '+VEHICLES[vehicle].label+'. Log what arose while it’s fresh.';b.dataset.vehicle=vehicle;b.dataset.minutes=minutes;}
function logFromDone(){const b=$('done-banner');prefillLog(b.dataset.vehicle,parseInt(b.dataset.minutes,10));b.classList.add('hidden');showView('log');}

let curRating=null;
function setRating(r){curRating=r;document.querySelectorAll('#rating .rb').forEach(b=>b.classList.toggle('on',r!=null&&Number(b.dataset.r)<=r));}
function prefillLog(vehicle,minutes){$('f-date').value=dstr(new Date());$('f-vehicle').value=vehicle||'image';$('f-minutes').value=minutes||sel.minutes;setRating(null);$('f-notes').value='';$('f-distractions').value='';}
function flash(btn,txt){const o=btn.textContent;btn.textContent=txt;btn.disabled=true;setTimeout(()=>{btn.textContent=o;btn.disabled=false;},1100);}
function saveLog(){
  const date=$('f-date').value||dstr(new Date());
  const minutes=Math.max(1,parseInt($('f-minutes').value,10)||sel.minutes);
  const entry={id:uid(),date,ts:Date.now(),vehicle:$('f-vehicle').value,minutes,rating:curRating,notes:$('f-notes').value.trim(),distractions:$('f-distractions').value.trim()};
  state.entries.push(entry);save();renderLog();renderStats();
  $('f-notes').value='';$('f-distractions').value='';setRating(null);flash($('btn-save'),'Saved ✓');
}
function delEntry(id){state.entries=state.entries.filter(x=>x.id!==id);save();renderLog();renderStats();}

function renderLog(){
  const list=$('history');list.innerHTML='';
  const items=[...state.entries].sort((a,b)=>b.ts-a.ts);
  if(!items.length){list.appendChild(el('div','empty','No sessions logged yet. Run a climb, then log what arose.'));return;}
  for(const e of items){
    const card=el('div','entry');
    const top=el('div','entry-top');
    top.appendChild(el('span','etag',VEHICLES[e.vehicle]?VEHICLES[e.vehicle].label:e.vehicle));
    top.appendChild(el('span','emin',e.minutes+' min'));
    top.appendChild(el('span','edate',e.date));
    card.appendChild(top);
    if(e.rating)card.appendChild(el('div','entry-meta','steadiness '+'◆'.repeat(e.rating)+'◇'.repeat(5-e.rating)));
    if(e.notes)card.appendChild(el('div','enote',escapeHtml(e.notes)));
    if(e.distractions)card.appendChild(el('div','edist','distractions: '+escapeHtml(e.distractions)));
    const del=el('button','edel','delete');del.onclick=()=>{if(confirm('Delete this entry?'))delEntry(e.id);};
    card.appendChild(del);list.appendChild(card);
  }
}

function streaks(days){
  if(!days.length)return{current:0,longest:0};
  const set=new Set(days),sorted=[...days].sort();let longest=1,run=1;
  for(let i=1;i<sorted.length;i++){const diff=(parseD(sorted[i])-parseD(sorted[i-1]))/86400000;if(diff===1){run++;if(run>longest)longest=run;}else if(diff>1){run=1;}}
  const today=dstr(new Date()),yest=prevStr(today);let anchor=set.has(today)?today:set.has(yest)?yest:null,current=0;
  if(anchor){let c=anchor;while(set.has(c)){current++;c=prevStr(c);}}
  if(current>longest)longest=current;return{current,longest};
}
function renderStats(){
  const E=state.entries;
  const totalMin=E.reduce((a,e)=>a+(e.minutes||0),0);
  const days=[...new Set(E.map(e=>e.date))];
  const{current,longest}=streaks(days);
  $('m-sessions').textContent=E.length;
  $('m-minutes').textContent=totalMin>=60?(Math.round(totalMin/6)/10)+'h':totalMin+'m';
  $('m-streak').textContent=current+(current===1?' day':' days');
  $('m-longest').textContent=longest+(longest===1?' day':' days');
  $('curve').innerHTML=buildCurve(E);
  $('breakdown').innerHTML=buildBreakdown(E);
  $('last14').innerHTML=buildLast14(E);
}
function buildCurve(E){
  if(E.length<1)return'<div class="empty">No data yet.</div>';
  const s=[...E].sort((a,b)=>a.date<b.date?-1:a.date>b.date?1:a.ts-b.ts);
  let cum=0;const pts=s.map(e=>cum+=e.minutes);
  const W=300,H=110,P=8,max=Math.max(...pts,1),n=pts.length;
  const X=i=>n<=1?W/2:P+(W-2*P)*i/(n-1),Y=v=>H-P-(H-2*P)*v/max;
  let d='';pts.forEach((v,i)=>{d+=(i===0?'M':'L')+X(i).toFixed(1)+' '+Y(v).toFixed(1)+' ';});
  let area='M'+X(0).toFixed(1)+' '+(H-P)+' '+pts.map((v,i)=>'L'+X(i).toFixed(1)+' '+Y(v).toFixed(1)).join(' ')+' L'+X(n-1).toFixed(1)+' '+(H-P)+' Z';
  const dot=n===1?'<circle cx="'+X(0)+'" cy="'+Y(pts[0])+'" r="3.5" fill="#e6a92e"/>':'';
  return'<svg viewBox="0 0 '+W+' '+H+'" width="100%" preserveAspectRatio="none" style="display:block"><path d="'+area+'" fill="rgba(230,169,46,0.10)"/><path d="'+d+'" fill="none" stroke="#e6a92e" stroke-width="2" stroke-linejoin="round" stroke-linecap="round"/>'+dot+'</svg><div class="cap">cumulative practice minutes · '+Math.round(cum)+' total</div>';
}
function buildBreakdown(E){
  const tot={};for(const k in VEHICLES)tot[k]=0;
  E.forEach(e=>{if(tot[e.vehicle]==null)tot[e.vehicle]=0;tot[e.vehicle]+=e.minutes;});
  let max=1,any=false;for(const k in tot)max=Math.max(max,tot[k]);
  let html='';Object.keys(VEHICLES).forEach(k=>{const v=tot[k]||0;if(v>0)any=true;const w=Math.round(100*v/max);html+='<div class="bd-row"><span class="bd-label">'+VEHICLES[k].label+'</span><span class="bd-bar"><span style="width:'+w+'%"></span></span><span class="bd-val">'+v+'m</span></div>';});
  return any?html:'<div class="empty">No data yet.</div>';
}
function buildLast14(E){
  const days=[];for(let i=13;i>=0;i--)days.push(prevN(i));
  const map={};E.forEach(e=>{map[e.date]=(map[e.date]||0)+e.minutes;});
  const max=Math.max(1,...days.map(d=>map[d]||0)),today=dstr(new Date());
  let html='<div class="l14">';
  days.forEach(d=>{const v=map[d]||0,h=Math.round(100*v/max);html+='<span class="l14-bar'+(d===today?' today':'')+(v>0?' has':'')+'" title="'+d+': '+v+'m"><span style="height:'+h+'%"></span></span>';});
  return html+'</div><div class="cap">last 14 days · minutes per day</div>';
}

function exportData(){const blob=new Blob([JSON.stringify(state,null,2)],{type:'application/json'});const a=document.createElement('a');a.href=URL.createObjectURL(blob);a.download='ascent-data-'+dstr(new Date())+'.json';document.body.appendChild(a);a.click();setTimeout(()=>{URL.revokeObjectURL(a.href);a.remove();},500);}
function importData(file){const r=new FileReader();r.onload=()=>{try{const inc=JSON.parse(r.result),incE=Array.isArray(inc)?inc:(inc.entries||[]),have=new Set(state.entries.map(e=>e.id));let added=0;incE.forEach(e=>{if(e&&typeof e==='object'){if(!e.id)e.id=uid();if(!have.has(e.id)){state.entries.push(e);have.add(e.id);added++;}}});save();renderLog();renderStats();alert('Imported '+added+' session(s).');}catch(err){alert('Could not read that file.');}};r.readAsText(file);}
function clearAll(){if(confirm('Delete ALL sessions? This cannot be undone.')){state.entries=[];save();renderLog();renderStats();}}

function showView(name){document.querySelectorAll('.view').forEach(v=>v.classList.remove('active'));$('view-'+name).classList.add('active');document.querySelectorAll('#tabbar button').forEach(b=>b.classList.toggle('on',b.dataset.v===name));if(name==='stats')renderStats();if(name==='log')renderLog();window.scrollTo(0,0);}
function render(){document.querySelectorAll('#veh-chips .chip').forEach(c=>c.classList.toggle('on',c.dataset.v===sel.vehicle));document.querySelectorAll('#dur-chips .chip').forEach(c=>c.classList.toggle('on',Number(c.dataset.m)===sel.minutes));$('veh-tip').textContent=VEHICLES[sel.vehicle].tip;$('plan').textContent=planText();}
function updateSound(){$('btn-sound').textContent=state.settings.sound?'sound on':'sound off';$('btn-sound').classList.toggle('off',!state.settings.sound);}

function init(){
  $('veh-chips').addEventListener('click',e=>{const c=e.target.closest('.chip');if(c){sel.vehicle=c.dataset.v;render();}});
  $('dur-chips').addEventListener('click',e=>{const c=e.target.closest('.chip');if(c){sel.minutes=Number(c.dataset.m);render();}});
  $('btn-begin').onclick=startSession;
  $('btn-pause').onclick=togglePause;
  $('btn-end').onclick=endSession;
  $('btn-donelog').onclick=logFromDone;
  $('btn-donedismiss').onclick=()=>$('done-banner').classList.add('hidden');
  $('tabbar').addEventListener('click',e=>{const b=e.target.closest('button');if(b)showView(b.dataset.v);});
  $('rating').addEventListener('click',e=>{const b=e.target.closest('.rb');if(b){const r=Number(b.dataset.r);setRating(r===curRating?null:r);}});
  $('btn-save').onclick=saveLog;
  $('btn-export').onclick=exportData;
  $('btn-import').onclick=()=>$('importer').click();
  $('importer').addEventListener('change',e=>{if(e.target.files&&e.target.files[0])importData(e.target.files[0]);e.target.value='';});
  $('btn-clear').onclick=clearAll;
  $('btn-sound').onclick=()=>{state.settings.sound=!state.settings.sound;save();updateSound();};
  updateSound();
  $('f-date').value=dstr(new Date());
  render();renderLog();renderStats();
  window.addEventListener('beforeinstallprompt',e=>{e.preventDefault();deferred=e;$('btn-install').classList.remove('hidden');});
  $('btn-install').onclick=async()=>{if(!deferred)return;deferred.prompt();await deferred.userChoice;deferred=null;$('btn-install').classList.add('hidden');};
  window.addEventListener('appinstalled',()=>$('btn-install').classList.add('hidden'));
}
init();
if('serviceWorker' in navigator){window.addEventListener('load',()=>navigator.serviceWorker.register('./sw.js').catch(()=>{}));}
})();
</script>
